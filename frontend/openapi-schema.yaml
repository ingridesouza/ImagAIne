components:
  schemas:
    AgentResponse:
      type: object
      properties:
        message:
          $ref: '#/components/schemas/SessionMessage'
        agent_response:
          $ref: '#/components/schemas/SessionMessage'
      required:
      - agent_response
      - message
    AspectRatioEnum:
      enum:
      - '1:1'
      - '16:9'
      - '4:3'
      - '9:16'
      - '3:2'
      type: string
      description: |-
        * `1:1` - 1:1
        * `16:9` - 16:9
        * `4:3` - 4:3
        * `9:16` - 9:16
        * `3:2` - 3:2
    ChangePasswordRequest:
      type: object
      description: Serializer for changing password while logged in.
      properties:
        current_password:
          type: string
          writeOnly: true
          minLength: 1
        new_password:
          type: string
          writeOnly: true
          minLength: 8
        new_password_confirm:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - current_password
      - new_password
      - new_password_confirm
    Character:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user:
          allOf:
          - $ref: '#/components/schemas/ImageUser'
          readOnly: true
        name:
          type: string
          maxLength: 100
        description:
          type: string
        style_notes:
          type: string
        references:
          type: array
          items:
            $ref: '#/components/schemas/CharacterReference'
          readOnly: true
        generation_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - generation_count
      - id
      - name
      - references
      - updated_at
      - user
    CharacterCreateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          default: ''
        style_notes:
          type: string
          default: ''
      required:
      - name
    CharacterGenerateRequest:
      type: object
      properties:
        scene:
          type: string
          minLength: 1
          description: 'Descrição da cena (ex: "em uma cafeteria")'
        style:
          allOf:
          - $ref: '#/components/schemas/StyleEnum'
          default: photorealistic
      required:
      - scene
    CharacterList:
      type: object
      description: Lighter serializer for character lists.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          readOnly: true
        description:
          type: string
          readOnly: true
        reference_count:
          type: integer
          readOnly: true
        generation_count:
          type: integer
          readOnly: true
        thumbnail_url:
          type: string
          format: uri
          nullable: true
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - description
      - generation_count
      - id
      - name
      - reference_count
      - thumbnail_url
      - updated_at
    CharacterReference:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        image:
          type: string
          format: uri
        image_url:
          type: string
          format: uri
          nullable: true
          readOnly: true
        order:
          type: integer
          maximum: 2147483647
          minimum: 0
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - image
      - image_url
    CommentLikeResponse:
      type: object
      properties:
        comment_id:
          type: integer
        is_liked:
          type: boolean
        like_count:
          type: integer
      required:
      - comment_id
      - is_liked
      - like_count
    CommentUnlikeResponse:
      type: object
      properties:
        comment_id:
          type: integer
        is_liked:
          type: boolean
        like_count:
          type: integer
      required:
      - comment_id
      - is_liked
      - like_count
    CreativeSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user:
          allOf:
          - $ref: '#/components/schemas/ImageUser'
          readOnly: true
        title:
          type: string
          maxLength: 200
        status:
          $ref: '#/components/schemas/SessionStatusEnum'
        messages:
          type: array
          items:
            $ref: '#/components/schemas/SessionMessage'
          readOnly: true
        message_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - message_count
      - messages
      - updated_at
      - user
    CreativeSessionList:
      type: object
      description: Lighter serializer for session lists (no messages).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/SessionStatusEnum'
          readOnly: true
        message_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - message_count
      - status
      - title
      - updated_at
    DetailResponse:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    DownloadResponse:
      type: object
      properties:
        download_url:
          type: string
          format: uri
        download_count:
          type: integer
      required:
      - download_count
      - download_url
    GenerateError:
      type: object
      properties:
        prompt:
          type: array
          items:
            type: string
    GenerateImageRequest:
      type: object
      properties:
        prompt:
          type: string
          minLength: 1
        negative_prompt:
          type: string
          nullable: true
        aspect_ratio:
          allOf:
          - $ref: '#/components/schemas/AspectRatioEnum'
          default: '1:1'
        seed:
          type: integer
          minimum: 0
          nullable: true
      required:
      - prompt
    GenerationTypeEnum:
      enum:
      - txt2img
      - img2img
      - variation
      - restyle
      - upscale
      type: string
      description: |-
        * `txt2img` - Text to Image
        * `img2img` - Image to Image
        * `variation` - Variation
        * `restyle` - Restyle
        * `upscale` - Upscale
    Image:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          allOf:
          - $ref: '#/components/schemas/ImageUser'
          readOnly: true
        prompt:
          type: string
          nullable: true
        negative_prompt:
