openapi: 3.0.3
info:
  title: ImagAIne API
  version: 1.0.0
  description: API da plataforma ImagAIne para geração, gerenciamento e compartilhamento
    de imagens criadas por inteligência artificial.
  contact:
    name: ImagAIne Team
  license:
    name: Proprietary
paths:
  /api/auth/account/:
    delete:
      operationId: auth_account_destroy
      description: Deleta permanentemente a conta do usuário e todas as suas imagens.
        Requer confirmação com a senha atual. Ação irreversível.
      summary: Deletar conta
      tags:
      - Auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: Autentica o usuário e retorna par de tokens JWT (access + refresh).
      summary: Login
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
          description: ''
  /api/auth/password/change/:
    post:
      operationId: auth_password_change_create
      description: Altera a senha do usuário autenticado. Requer a senha atual.
      summary: Trocar senha
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/auth/password/reset/confirm/:
    post:
      operationId: auth_password_reset_confirm_create
      description: Valida o token e define nova senha.
      summary: Confirmar reset de senha
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/auth/password/reset/request/:
    post:
      operationId: auth_password_reset_request_create
      description: Envia email com link de reset. Não revela se o email existe.
      summary: Solicitar reset de senha
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/auth/preferences/:
    get:
      operationId: auth_preferences_retrieve
      description: Retorna as preferências salvas do usuário (JSON livre).
      summary: Obter preferências
      tags:
      - Profile
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    put:
      operationId: auth_preferences_update
      description: Substitui as preferências do usuário por um objeto JSON.
      summary: Atualizar preferências
      tags:
      - Profile
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/profile/:
    get:
      operationId: auth_profile_retrieve
      description: View to retrieve and update user profile.
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    put:
      operationId: auth_profile_update
      description: View to retrieve and update user profile.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    patch:
      operationId: auth_profile_partial_update
      description: View to retrieve and update user profile.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/auth/profile/avatar/:
    post:
      operationId: auth_profile_avatar_create
      description: Envia ou substitui a foto de perfil do usuário.
      summary: Upload de avatar
      tags:
      - Profile
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
              - file
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/auth/profile/cover/:
    post:
      operationId: auth_profile_cover_create
      description: Envia ou substitui a imagem de capa do usuário.
      summary: Upload de capa
      tags:
      - Profile
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
              - file
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/auth/register/:
    post:
      operationId: auth_register_create
      description: View for user registration.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRegistration'
          description: ''
  /api/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/auth/verify-email/{token}/:
    get:
      operationId: auth_verify_email_retrieve
      description: Valida o token de verificação enviado por email. Token expira em
        24h.
      summary: Verificar email
      parameters:
      - in: path
        name: token
        schema:
          type: string
        required: true
      tags:
      - Auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/characters/:
    get:
      operationId: characters_list
      description: Lista personagens do usuário com contagem de referências e gerações.
      summary: Listar personagens
      tags:
      - Characters
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CharacterList'
          description: ''
    post:
      operationId: characters_create
      description: Cria um novo personagem. Imagens de referência são adicionadas
        separadamente.
      summary: Criar personagem
      tags:
      - Characters
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CharacterCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CharacterCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CharacterCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Character'
          description: ''
  /api/characters/{id}/:
    get:
      operationId: characters_retrieve
      description: Retorna personagem com referências e gerações.
      summary: Detalhe do personagem
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Characters
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Character'
          description: ''
    put:
      operationId: characters_update
      description: Atualiza nome, descrição ou notas de estilo.
      summary: Atualizar personagem
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Characters
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CharacterCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CharacterCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CharacterCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Character'
          description: ''
    delete:
      operationId: characters_destroy
      description: Deleta personagem e referências. Gerações (imagens) não são deletadas.
      summary: Deletar personagem
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Characters
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/characters/{id}/generate/:
    post:
      operationId: characters_generate_create
      description: Gera uma imagem com o personagem em uma cena descrita. Combina
        a descrição do personagem + cena + estilo no prompt.
      summary: Gerar cena com personagem
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Characters
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CharacterGenerateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CharacterGenerateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CharacterGenerateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
          description: ''
  /api/characters/{id}/references/:
    post:
      operationId: characters_references_create
      description: Adiciona uma imagem de referência ao personagem (multipart).
      summary: Upload referência
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Characters
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
              - file
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefUploaded'
          description: ''
    delete:
      operationId: characters_references_destroy
      description: Remove uma imagem de referência do personagem.
      summary: Remover referência
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Characters
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/characters/{id}/references/{ref_id}/remove/:
    post:
      operationId: characters_references_remove_create
      description: Adiciona uma imagem de referência ao personagem (multipart).
      summary: Upload referência
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: ref_id
        schema:
          type: integer
        required: true
      tags:
      - Characters
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
              - file
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefUploaded'
          description: ''
    delete:
      operationId: characters_references_remove_destroy
      description: Remove uma imagem de referência do personagem.
      summary: Remover referência
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: ref_id
        schema:
          type: integer
        required: true
      tags:
      - Characters
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/generate/:
    post:
      operationId: generate_create
      description: Envia um prompt para geração assíncrona de imagem via FLUX.1-dev.
        A imagem é criada com status GENERATING e transiciona para READY ou FAILED.
        Respeita a quota mensal do plano do usuário.
      summary: Gerar imagem
      tags:
      - Generation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateImageRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GenerateImageRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/GenerateImageRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateError'
          description: ''
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuotaExceeded'
          description: ''
  /api/images/{id}/comments/:
    get:
      operationId: images_comments_list
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - images
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedImageCommentList'
          description: ''
    post:
      operationId: images_comments_create
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - images
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageCommentCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ImageCommentCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ImageCommentCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageCommentCreate'
          description: ''
  /api/images/{id}/comments/{comment_id}/:
    delete:
      operationId: images_comments_destroy
      parameters:
      - in: path
        name: comment_id
        schema:
          type: integer
        required: true
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - images
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/images/{id}/comments/{comment_id}/like/:
    post:
      operationId: images_comments_like_create
      description: Adiciona um like ao comentário.
      summary: Curtir comentário
      parameters:
      - in: path
        name: comment_id
        schema:
          type: integer
        required: true
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Social
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentLikeResponse'
          description: ''
    delete:
      operationId: images_comments_like_destroy
      description: Remove o like do comentário.
      summary: Descurtir comentário
      parameters:
      - in: path
        name: comment_id
        schema:
          type: integer
        required: true
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Social
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentUnlikeResponse'
          description: ''
        '404':
          description: No response body
  /api/images/{id}/download/:
    post:
      operationId: images_download_create
      description: Incrementa o contador de downloads e retorna a URL para download.
      summary: Download de imagem
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Social
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadResponse'
          description: ''
        '400':
          description: No response body
  /api/images/{id}/like/:
    post:
      operationId: images_like_create
      description: 'Adiciona um like à imagem. Idempotente: se já curtiu, retorna
        200.'
      summary: Curtir imagem
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Social
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
          description: ''
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
          description: ''
    delete:
      operationId: images_like_destroy
      description: Remove o like da imagem.
      summary: Descurtir imagem
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Social
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LikeNotFound'
          description: ''
  /api/images/{id}/related/:
    get:
      operationId: images_related_retrieve
      description: Retorna até 12 imagens similares baseadas em embeddings vetoriais.
        Usa image embedding (visual) com fallback para prompt embedding (texto). A
        imagem-fonte deve ser pública ou pertencer ao usuário.
      summary: Imagens relacionadas
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - in: query
        name: limit
        schema:
          type: integer
        description: Máximo de resultados (default 12, max 20)
      tags:
      - Creative Memory
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelatedImagesResponse'
          description: ''
  /api/images/{id}/restyle/:
    post:
      operationId: images_restyle_create
      description: Aplica um estilo diferente a uma imagem existente. O prompt original
        é combinado com modificadores do estilo escolhido.
      summary: Mudar estilo
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Image Editing
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestyleRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RestyleRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RestyleRequestRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
          description: ''
  /api/images/{id}/share/:
    post:
      operationId: images_share_create
      description: Torna a imagem pública na galeria.
      summary: Publicar imagem
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Social
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
          description: ''
    patch:
      operationId: images_share_partial_update
      description: Altera o status público/privado da imagem.
      summary: Alterar visibilidade
      parameters:
