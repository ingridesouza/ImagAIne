openapi: 3.0.3
info:
  title: ImagAIne API
  version: 1.0.0
  description: API da plataforma ImagAIne para geração, gerenciamento e compartilhamento
    de imagens criadas por inteligência artificial.
  contact:
    name: ImagAIne Team
  license:
    name: Proprietary
paths:
  /api/auth/account/:
    delete:
      operationId: auth_account_destroy
      description: Deleta permanentemente a conta do usuário e todas as suas imagens.
        Requer confirmação com a senha atual. Ação irreversível.
      summary: Deletar conta
      tags:
      - Auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: Autentica o usuário e retorna par de tokens JWT (access + refresh).
      summary: Login
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
          description: ''
  /api/auth/password/change/:
    post:
      operationId: auth_password_change_create
      description: Altera a senha do usuário autenticado. Requer a senha atual.
      summary: Trocar senha
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/auth/password/reset/confirm/:
    post:
      operationId: auth_password_reset_confirm_create
      description: Valida o token e define nova senha.
      summary: Confirmar reset de senha
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/auth/password/reset/request/:
    post:
      operationId: auth_password_reset_request_create
      description: Envia email com link de reset. Não revela se o email existe.
      summary: Solicitar reset de senha
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/auth/preferences/:
    get:
      operationId: auth_preferences_retrieve
      description: Retorna as preferências salvas do usuário (JSON livre).
      summary: Obter preferências
      tags:
      - Profile
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    put:
      operationId: auth_preferences_update
      description: Substitui as preferências do usuário por um objeto JSON.
      summary: Atualizar preferências
      tags:
      - Profile
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/profile/:
    get:
      operationId: auth_profile_retrieve
      description: View to retrieve and update user profile.
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    put:
      operationId: auth_profile_update
      description: View to retrieve and update user profile.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    patch:
      operationId: auth_profile_partial_update
      description: View to retrieve and update user profile.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/auth/profile/avatar/:
    post:
      operationId: auth_profile_avatar_create
      description: Envia ou substitui a foto de perfil do usuário.
      summary: Upload de avatar
      tags:
      - Profile
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
              - file
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/auth/profile/cover/:
    post:
      operationId: auth_profile_cover_create
      description: Envia ou substitui a imagem de capa do usuário.
      summary: Upload de capa
      tags:
      - Profile
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
              - file
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/auth/register/:
    post:
      operationId: auth_register_create
      description: View for user registration.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRegistration'
          description: ''
  /api/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/auth/verify-email/{token}/:
    get:
      operationId: auth_verify_email_retrieve
      description: Valida o token de verificação enviado por email. Token expira em
        24h.
      summary: Verificar email
      parameters:
      - in: path
        name: token
        schema:
          type: string
        required: true
      tags:
      - Auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /api/generate/:
    post:
      operationId: generate_create
      description: Envia um prompt para geração assíncrona de imagem via FLUX.1-dev.
        A imagem é criada com status GENERATING e transiciona para READY ou FAILED.
        Respeita a quota mensal do plano do usuário.
      summary: Gerar imagem
      tags:
      - Generation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateImageRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GenerateImageRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/GenerateImageRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateError'
          description: ''
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuotaExceeded'
          description: ''
  /api/images/{id}/comments/:
    get:
      operationId: images_comments_list
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - images
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedImageCommentList'
          description: ''
    post:
      operationId: images_comments_create
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - images
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageCommentCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ImageCommentCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ImageCommentCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageCommentCreate'
          description: ''
  /api/images/{id}/comments/{comment_id}/:
    delete:
      operationId: images_comments_destroy
      parameters:
      - in: path
        name: comment_id
        schema:
          type: integer
        required: true
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - images
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/images/{id}/comments/{comment_id}/like/:
    post:
      operationId: images_comments_like_create
      description: Adiciona um like ao comentário.
      summary: Curtir comentário
      parameters:
      - in: path
        name: comment_id
        schema:
          type: integer
        required: true
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Social
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentLikeResponse'
          description: ''
    delete:
      operationId: images_comments_like_destroy
      description: Remove o like do comentário.
      summary: Descurtir comentário
      parameters:
      - in: path
        name: comment_id
        schema:
          type: integer
        required: true
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Social
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentUnlikeResponse'
          description: ''
        '404':
          description: No response body
  /api/images/{id}/download/:
    post:
      operationId: images_download_create
      description: Incrementa o contador de downloads e retorna a URL para download.
      summary: Download de imagem
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Social
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadResponse'
          description: ''
        '400':
          description: No response body
  /api/images/{id}/like/:
    post:
      operationId: images_like_create
      description: 'Adiciona um like à imagem. Idempotente: se já curtiu, retorna
        200.'
      summary: Curtir imagem
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Social
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
          description: ''
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
          description: ''
    delete:
      operationId: images_like_destroy
      description: Remove o like da imagem.
      summary: Descurtir imagem
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Social
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LikeNotFound'
          description: ''
  /api/images/{id}/related/:
    get:
      operationId: images_related_retrieve
      description: Retorna até 12 imagens similares baseadas em embeddings vetoriais.
        Usa image embedding (visual) com fallback para prompt embedding (texto). A
        imagem-fonte deve ser pública ou pertencer ao usuário.
      summary: Imagens relacionadas
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - in: query
        name: limit
        schema:
          type: integer
        description: Máximo de resultados (default 12, max 20)
      tags:
      - Creative Memory
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelatedImagesResponse'
          description: ''
  /api/images/{id}/share/:
    post:
      operationId: images_share_create
      description: Torna a imagem pública na galeria.
      summary: Publicar imagem
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Social
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
          description: ''
    patch:
      operationId: images_share_partial_update
      description: Altera o status público/privado da imagem.
      summary: Alterar visibilidade
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Social
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedImageShareUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedImageShareUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedImageShareUpdateRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
          description: ''
        '400':
          description: No response body
        '404':
          description: No response body
  /api/images/liked/:
    get:
      operationId: images_liked_list
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - images
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedImageList'
          description: ''
  /api/images/my-images/:
    get:
      operationId: images_my_images_list
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - images
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedImageList'
          description: ''
  /api/images/public/:
    get:
      operationId: images_public_list
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - images
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedImageList'
          description: ''
  /api/projects/:
    get:
      operationId: projects_list
      description: Lista projetos do usuário autenticado.
      summary: Listar projetos
      tags:
      - Projects
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
          description: ''
    post:
      operationId: projects_create
      description: Cria um novo projeto vazio.
      summary: Criar projeto
      tags:
      - Projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
          description: ''
  /api/projects/{id}/:
    get:
      operationId: projects_retrieve
      description: Retorna o projeto com todas as imagens ordenadas.
      summary: Detalhe do projeto
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Projects
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
          description: ''
    put:
      operationId: projects_update
      description: Atualiza título, descrição ou visibilidade do projeto.
      summary: Atualizar projeto
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
          description: ''
    delete:
      operationId: projects_destroy
      description: Deleta o projeto. Imagens não são deletadas, apenas desassociadas.
      summary: Deletar projeto
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Projects
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/projects/{id}/images/:
    post:
      operationId: projects_images_create
      description: Associa uma imagem existente ao projeto com ordem e legenda.
      summary: Adicionar imagem ao projeto
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectImageAddRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProjectImageAddRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProjectImageAddRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectImageAdded'
          description: ''
    delete:
      operationId: projects_images_destroy
      description: Desassocia uma imagem do projeto (não deleta a imagem).
      summary: Remover imagem do projeto
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Projects
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/projects/{id}/images/{image_id}/remove/:
    post:
      operationId: projects_images_remove_create
      description: Associa uma imagem existente ao projeto com ordem e legenda.
      summary: Adicionar imagem ao projeto
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: image_id
        schema:
          type: integer
        required: true
      tags:
      - Projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectImageAddRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProjectImageAddRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProjectImageAddRequest'
