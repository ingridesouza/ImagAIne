  /api/refine-prompt/:
    post:
      operationId: refine_prompt_create
      description: Transforma uma descrição casual em um prompt otimizado para geração
        de imagem. Usa o DeepSeek LLM para gerar prompt em inglês com modificadores
        técnicos.
      summary: Refinar prompt
      tags:
      - Prompt Assistant
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefinePromptRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RefinePromptRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RefinePromptRequestRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
